<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivers.run - 404 Not Found</title>
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --primary: #3b82f6;
            --secondary: #64748b;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8fafc;
                --text: #0f172a;
                --primary: #1d4ed8;
                --secondary: #475569;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h1 { font-size: 3rem; margin-bottom: 1rem; }
        p { font-size: 1.25rem; color: var(--secondary); margin-bottom: 2rem; max-width: 600px; line-height: 1.6; }
        a {
            background-color: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>404 - Not Found</h1>
    <p>
        I could have turned on the dam early, getting the file stuck in a hydraulic.<br>
        You could have paddled down the wrong river.<br>
        The page could have made a wrong turn on the shuttle.
    </p>
    <a href="/">Point me Downstream (Go Home)</a>
</body>
</html>
