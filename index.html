<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/icons/icon-192.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Flow information, access points, dam releases, and more, featuring over 250 rivers!">
    
    <!-- Performance Hints -->
    <link rel="preconnect" href="https://api.rivers.run" crossorigin />
    <link rel="preconnect" href="https://flow.rivers.run" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />

    <!-- Double Preload (Inventory first, Sensors second) -->
    <link rel="preload" as="fetch" href="https://api.rivers.run/rivers" crossorigin="anonymous" />
    <link rel="preload" as="fetch" href="https://flow.rivers.run/flowdata" crossorigin="anonymous" />
    <!-- Open Graph Data -->
    <meta property="og:title" content="Rivers.run - Paddling and River Information">
    <meta property="og:description" content="Flow information, access points, dam releases, and more, featuring over 250 rivers!">
    <meta property="og:image" content="https://rivers.run/resources/images/preview.png">
    <meta property="og:url" content="https://rivers.run/">
    <meta property="og:type" content="website">

    <!-- Twitter Card Data -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Rivers.run - Paddling and River Information">
    <meta name="twitter:description" content="Flow information, access points, dam releases, and more, featuring over 250 rivers!">
    <meta name="twitter:image" content="https://rivers.run/resources/images/preview.png">

    <title>Rivers.run</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
