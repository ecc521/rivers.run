name: Deploy Cloudflare Services

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # --- 1. FRONTEND DEPLOYMENT ---
      - name: Install Frontend dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint

      - name: Test Frontend
        run: npm test

      - name: Build Frontend
        run: npm run build

      - name: Deploy Frontend to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      # --- 2. API WORKER DEPLOYMENT ---
      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Test API
        run: npm test
        working-directory: api

      - name: Deploy API to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: api
          command: deploy

      # --- 3. API FLOW WORKER DEPLOYMENT ---
      - name: Install API Flow dependencies
        run: npm ci
        working-directory: api-flow

      - name: Test API Flow
        run: npm test
        working-directory: api-flow

      - name: Deploy API Flow to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: api-flow
          command: deploy
