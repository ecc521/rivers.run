name = "api-flow"
main = "src/index.ts"
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787
strict_port = true

# 10 Million Requests / month
# Cloudflare Workers Standard Pricing now automatically applies unbound limits
# to cron fetch loops without needing to specify usage_model.
# We strictly bind R2 here isolated from the DB app for clean separation
[[r2_buckets]]
binding = "FLOW_STORAGE"
bucket_name = "flowdata"

# Optional: Bind D1 dynamically if we need to query rivers mapping 
[[d1_databases]]
binding = "DB"
database_name = "rivers-db"
database_id = "d52e56f5-d59f-4e59-b2e0-7b8b7a8dde71"
  
[[routes]]
pattern = "flow.rivers.run"
custom_domain = true

# Cron triggers for background polling
# 1. 15-minute gauge polling
# 2. Weekly full registry recompilation (every Friday)
[triggers]
crons = ["*/15 * * * *", "0 0 * * *", "0 0 * * 5"]
